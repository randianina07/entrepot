<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>

<body>

<h2>Connexion</h2>

<div th:if="${param.error}">
    <p style="color:red">
        Email ou mot de passe incorrect.
    </p>
</div>

<div th:if="${param.logout}">
    <p style="color:green">
        Vous êtes déconnecté.
    </p>
</div>

<form th:action="@{/login}" method="post">

    <label>Email :</label>

    <input
            type="email"
            name="email"
            required>

    <br><br>

    <label>Mot de passe :</label>

    <input
            type="password"
            name="password"
            required>

    <br><br>

    <button type="submit">
        Se connecter
    </button>

</form>

</body>
</html>
