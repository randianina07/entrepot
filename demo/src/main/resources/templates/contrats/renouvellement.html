<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Demande de renouvellement</title>
</head>

<body>

    <h2>Demande de renouvellement</h2>

    <form th:action="@{/contrats/renouvellement}" th:object="${demande}" method="post">

        <div>
            <label for="contratId">Contrat à renouveler</label>

            <select id="contratId" name="contratId" required>
                <option value="">-- Sélectionner un contrat --</option>

                <option th:each="contrat : ${contrats}" th:value="${contrat.id}"
                    th:text="|Contrat #${contrat.id} - ${contrat.typeZone.libelle} (${contrat.dateDebut} → ${contrat.dateFin})|">
                </option>
            </select>
        </div>

        <br>

        <div>
            <label for="dateFin">Nouvelle date de fin souhaitée</label>
            <input id="dateFin" type="date" th:field="*{dateFin}" required>
        </div>

        <br>

        <button type="submit">
            Envoyer la demande
        </button>

    </form>

</body>

</html>
