<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Demande de stockage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        form {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            padding: 8px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .success {
            color: green;
        }
    </style>
</head>


<body>

    <h1>Faire une demande de stockage</h1>


    <p class="success" th:if="${param.success}">
        Votre demande a été envoyée avec succès.
    </p>


    <form th:action="@{/contrats/demande}" method="post">


        <label>
            Type de zone
        </label>

        <select name="typeZoneId" required>

            <option value="">
                -- Choisir une zone --
            </option>

            <option th:each="zone : ${typesZone}" th:value="${zone.id}" th:text="${zone.libelle}">
            </option>

        </select>



        <label>
            Type de contrat
        </label>

        <select name="typeContratId" required>

            <option value="">
                -- Choisir un contrat --
            </option>

            <option th:each="contrat : ${typesContrat}" th:value="${contrat.id}" th:text="${contrat.libelle}">
            </option>

        </select>



        <label>
            Volume demandé (m³)
        </label>

        <input type="number" name="volumeEspaceM3" step="0.001" min="0.001" required>



        <label>
            Date de début
        </label>

        <input type="date" name="dateDebut" required>



        <label>
            Date de fin
        </label>

        <input type="date" name="dateFin">



        <button type="submit">
            Envoyer la demande
        </button>


    </form>


</body>

</html>
