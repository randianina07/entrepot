<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrepot Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="bi bi-box-seam"></i> Gestion Entrepot
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#execInfo.templateName == 'home' ? 'active' : ''}" href="/">
                        <i class="bi bi-house-door"></i> Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#execInfo.templateName == 'dashboard/stats' ? 'active' : ''}" href="/dashboard/stats">
                        <i class="bi bi-bar-chart"></i> Statistiques &amp; BI
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navChauffeurs" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-truck"></i> Logistique
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/chauffeurs"><i class="bi bi-person-badge"></i> Chauffeurs</a></li>
                        <li><a class="dropdown-item" href="/vehicules/liste"><i class="bi bi-truck-front"></i> Vehicules</a></li>
                        <li><a class="dropdown-item" href="/livraisons/livraison"><i class="bi bi-box-arrow-up-right"></i> Livraisons</a></li>
                        <li><a class="dropdown-item" href="/missions/save"><i class="bi bi-diagram-3"></i> Missions</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       th:classappend="${#strings.startsWith(#execInfo.templateName, 'Emplacement/') or #execInfo.templateName == 'search' ? 'active' : ''}"
                       href="#" id="navStockage" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-boxes"></i> Stockages
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/accueil"><i class="bi bi-house-door"></i> Accueil stockages</a></li>
                        <li><a class="dropdown-item" href="/choose-type_zones"><i class="bi bi-grid-3x3-gap"></i> Visualisation</a></li>
                        <li><a class="dropdown-item" href="/recherche"><i class="bi bi-search"></i> Recherche rapide</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
