<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des chauffeurs</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page-shell">
    <header class="page-header">
        <div>
            <p class="eyebrow">Gestion des chauffeurs</p>
            <h1>Liste des chauffeurs</h1>
        </div>
        <div class="header-actions">
            <a class="button secondary" th:href="@{/}">Accueil</a>
            <a class="button" th:href="@{/chauffeurs/ajouter}">Ajouter un chauffeur</a>
        </div>
    </header>

    <section class="card">
        <form class="toolbar" method="get" th:action="@{/chauffeurs}">
            <div class="field">
                <label for="statut">Statut</label>
                <select id="statut" name="statut">
                    <option value="all" th:selected="${statutSelectionne == null or statutSelectionne == 'all'}">Tous</option>
                    <option value="actif" th:selected="${statutSelectionne != null and statutSelectionne.equalsIgnoreCase('actif')}">Actif</option>
                    <option value="non-actif" th:selected="${statutSelectionne != null and (statutSelectionne.equalsIgnoreCase('non-actif') or statutSelectionne.equalsIgnoreCase('nonactif'))}">Non actif</option>
                </select>
            </div>

            <div class="field">
                <label for="dateDebutExpiration">Date début expiration</label>
                <input id="dateDebutExpiration" type="date" name="dateDebutExpiration" th:value="${dateDebutSelectionnee}">
            </div>

            <div class="field">
                <label for="dateFinExpiration">Date fin expiration</label>
                <input id="dateFinExpiration" type="date" name="dateFinExpiration" th:value="${dateFinSelectionnee}">
            </div>

            <div class="toolbar-actions">
                <button class="button" type="submit">Filtrer</button>
                <a class="button ghost" th:href="@{/chauffeurs}">Réinitialiser</a>
            </div>
        </form>
    </section>

    <section class="card table-card">
        <div class="table-meta">
            <span th:text="${'Nombre de chauffeurs : ' + (chauffeurs != null ? chauffeurs.size() : 0)}"></span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Téléphone</th>
                    <th>Numéro permis</th>
                    <th>Expiration</th>
                    <th>Actif</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${chauffeurs == null or chauffeurs.isEmpty()}">
                    <td colspan="6">
                        <div class="empty-state">Aucun chauffeur ne correspond aux filtres sélectionnés.</div>
                    </td>
                </tr>
                <tr th:each="chauffeur : ${chauffeurs}">
                    <td th:text="${chauffeur.nom}"></td>
                    <td th:text="${chauffeur.prenom}"></td>
                    <td th:text="${chauffeur.telephone}"></td>
                    <td th:text="${chauffeur.numeroPermis}"></td>
                    <td th:text="${chauffeur.dateExpirationPermis}"></td>
                    <td>
                        <span class="badge" th:classappend="${chauffeur.actif} ? ' success' : ' muted'" th:text="${chauffeur.actif ? 'Oui' : 'Non'}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
