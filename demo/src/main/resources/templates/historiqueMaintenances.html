<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des maintenances</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page-shell">
    <header class="page-header">
        <div>
            <p class="eyebrow">Suivi véhicule</p>
            <h1>Historique des maintenances</h1>
        </div>
        <div class="header-actions">
            <a class="button secondary" th:href="@{/}">Accueil</a>
            <a class="button" th:href="@{/maintenances/ajouter}">Ajouter une maintenance</a>
        </div>
    </header>

    <section class="card table-card">
        

        <form class="toolbar" method="get" th:action="@{/maintenances}">
            <div class="field">
                <label for="typeMaintenanceId">Type maintenance</label>
                <select id="typeMaintenanceId" name="typeMaintenanceId">
                    <option value="" th:selected="${typeMaintenanceIdSelectionne == null}">Tous</option>
                    <option th:each="typeMaintenance : ${typesMaintenances}"
                            th:value="${typeMaintenance.id}"
                            th:text="${typeMaintenance.libelleAffichage}"
                            th:selected="${typeMaintenanceIdSelectionne != null and typeMaintenanceIdSelectionne == typeMaintenance.id}"></option>
                </select>
            </div>

            <div class="field">
                <label for="dateDebutMaintenance">Date début maintenance</label>
                <input id="dateDebutMaintenance"
                       type="date"
                       name="dateDebutMaintenance"
                       th:value="${dateDebutMaintenanceSelectionnee}">
            </div>

            <div class="field">
                <label for="dateFinMaintenance">Date fin maintenance</label>
                <input id="dateFinMaintenance"
                       type="date"
                       name="dateFinMaintenance"
                       th:value="${dateFinMaintenanceSelectionnee}">
            </div>

            <div class="toolbar-actions">
                <button class="button" type="submit">Filtrer</button>
                <a class="button ghost" th:href="@{/maintenances}">Réinitialiser</a>
            </div>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Véhicule</th>
                    <th>Type maintenance</th>
                    <th>Date maintenance</th>
                    <th>Kilométrage</th>
                    <th>Coût</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${maintenances == null or maintenances.isEmpty()}">
                    <td colspan="6">
                        <div class="empty-state">Aucune maintenance enregistrée.</div>
                    </td>
                </tr>
                <tr th:each="maintenance : ${maintenances}">
                    <td th:text="${maintenance.vehiculeId}"></td>
                    <td th:text="${maintenance.typeMaintenanceId}"></td>
                    <td th:text="${maintenance.dateMaintenance}"></td>
                    <td th:text="${maintenance.kilometrage}"></td>
                    <td th:text="${maintenance.cout}"></td>
                    <td th:text="${maintenance.description}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
