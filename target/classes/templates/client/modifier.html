<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-pencil"></i> Modifier client</span>
            <h1>Modifier un client</h1>
            <p>Mettez à jour les informations du client.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/clients}">Retour à la liste</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations du client</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" th:action="@{/clients/modifier/{id}(id=${client.id})}" th:object="${client}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{utilisateur.id}">

                <div class="col-md-6">
                    <label for="nom" class="form-label">Nom <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nom" th:field="*{nom}" required>
                </div>

                <div class="col-md-6">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" class="form-control" id="prenom" th:field="*{prenom}">
                </div>

                <div class="col-md-6">
                    <label for="numero" class="form-label">Téléphone</label>
                    <input type="text" class="form-control" id="numero" th:field="*{numero}">
                </div>

                <div class="col-md-6">
                    <label for="adresse" class="form-label">Adresse</label>
                    <input type="text" class="form-control" id="adresse" th:field="*{adresse}">
                </div>

                <div class="col-md-6">
                    <label for="secteur" class="form-label">Secteur</label>
                    <input type="text" class="form-control" id="secteur" th:field="*{secteur}">
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" th:field="*{utilisateur.email}" required>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Enregistrer les modifications
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/clients}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
