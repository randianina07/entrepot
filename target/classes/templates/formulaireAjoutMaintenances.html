<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-tools"></i> Nouvelle maintenance</span>
            <h1>Formulaire de maintenance</h1>
            <p>Enregistrez une nouvelle maintenance pour un véhicule.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/maintenances}">Retour à l'historique</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations de la maintenance</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" method="post" th:action="@{/maintenances/ajouter}">
                <div class="col-md-6">
                    <label for="vehiculeId" class="form-label">Véhicule <span class="text-danger">*</span></label>
                    <select class="form-select" id="vehiculeId" name="vehiculeId" required>
                        <option value="">Sélectionner un véhicule</option>
                        <option th:each="vehicule : ${vehicules}"
                                th:value="${vehicule.id}"
                                th:text="${vehicule.immatriculation + ' - ' + (vehicule.marque != null ? vehicule.marque : '') + ' ' + (vehicule.modele != null ? vehicule.modele : '')}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="typeMaintenanceId" class="form-label">Type maintenance <span class="text-danger">*</span></label>
                    <select class="form-select" id="typeMaintenanceId" name="typeMaintenanceId" required>
                        <option value="">Sélectionner un type</option>
                        <option th:each="typeMaintenance : ${typesMaintenances}"
                                th:value="${typeMaintenance.id}"
                                th:text="${typeMaintenance.libelle}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="dateMaintenance" class="form-label">Date maintenance <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dateMaintenance" name="dateMaintenance" required>
                </div>

                <div class="col-md-4">
                    <label for="cout" class="form-label">Coût</label>
                    <input type="number" class="form-control" id="cout" name="cout" step="0.01" min="0" placeholder="0.00">
                </div>

                <div class="col-md-4">
                    <label for="kilometrage" class="form-label">Kilométrage</label>
                    <input type="number" class="form-control" id="kilometrage" name="kilometrage" step="0.01" min="0" placeholder="0.00">
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4" placeholder="Décrire l'opération effectuée"></textarea>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Enregistrer
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/maintenances}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
