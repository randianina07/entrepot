<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - Gestion Entrepôt' : 'Gestion Entrepôt'}">Gestion Entrepôt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <th:block th:if="${extraStyles != null}">
        <th:block th:each="style : ${extraStyles}">
            <link rel="stylesheet" th:href="${style}">
        </th:block>
    </th:block>
</head>
<body th:class="${bodyClass != null ? bodyClass : 'pro-body'}">
    <div th:replace="~{fragments/navbar-new :: navbar}"></div>
    
    <div class="container py-4">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        
        <th:block th:replace="${content}"></th:block>
    </div>
    
    <!-- Professional Footer -->
    <footer class="pro-footer mt-5 py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="text-muted mb-0">
                        <i class="bi bi-box-seam-fill"></i> Gestion Entrepôt
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted mb-0">
                        © 2026 Système de Gestion d'Entrepôt Professionnel
                    </p>
                </div>
            </div>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:if="${extraScripts != null}">
        <th:block th:each="script : ${extraScripts}">
            <script th:src="${script}"></script>
        </th:block>
    </th:block>
</body>
</html>

<style>
.pro-footer {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    margin-top: 3rem;
}

.pro-body {
    background: var(--bg-primary);
    min-height: 100vh;
}
</style>
