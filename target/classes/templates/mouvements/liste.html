<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container mt-4">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-list-ul"></i> Liste des Mouvements</h1>
            <div>
                <a href="/mouvements/nouveau/entree" class="btn btn-success me-2">
                    <i class="bi bi-plus-circle"></i> Nouveau Entree
                </a>
                <a href="/mouvements/nouveau/sortie" class="btn btn-danger">
                    <i class="bi bi-plus-circle"></i> Nouveau Sortie
                </a>
            </div>
        </div>
        
        <!-- Formulaire de filtres -->
        <div class="card mb-4">
            <div class="card-header">
                <i class="bi bi-funnel"></i> Filtres
            </div>
            <div class="card-body">
                <form th:action="@{/mouvements/liste}" method="get" class="row g-3">
                    <div class="col-md-2">
                        <label for="type" class="form-label">Type</label>
                        <select class="form-select" id="type" name="type">
                            <option value="">Tous</option>
                            <option th:each="t : ${types}" th:value="${t.code}" 
                                    th:text="${t.libelle}" th:selected="${filtre?.type == t.code}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="statut" class="form-label">Statut</label>
                        <select class="form-select" id="statut" name="statut">
                            <option value="">Tous</option>
                            <option th:each="s : ${statuts}" th:value="${s.code}" 
                                    th:text="${s.libelle}" th:selected="${filtre?.statut == s.code}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="client" class="form-label">Client</label>
                        <select class="form-select" id="client" name="clientId">
                            <option value="">Tous</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" 
                                    th:text="${c.nom}" th:selected="${filtre?.clientId == c.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="dateDebut" class="form-label">Date debut</label>
                        <input type="date" class="form-control" id="dateDebut" name="dateDebut" 
                               th:value="${filtre?.dateDebut}">
                    </div>
                    <div class="col-md-2">
                        <label for="dateFin" class="form-label">Date fin</label>
                        <input type="date" class="form-control" id="dateFin" name="dateFin" 
                               th:value="${filtre?.dateFin}">
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-filter"></i> Filtrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Bouton export CSV -->
        <div class="mb-3">
            <a th:href="@{/mouvements/export/csv(type=${filtre?.type}, statut=${filtre?.statut}, 
               clientId=${filtre?.clientId}, dateDebut=${filtre?.dateDebut}, dateFin=${filtre?.dateFin})}" 
               class="btn btn-outline-success">
                <i class="bi bi-file-earmark-excel"></i> Exporter CSV
            </a>
        </div>
        
        <!-- Tableau des mouvements -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Code</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Statut</th>
                                <th>Client</th>
                                <th>Nb Lignes</th>
                                <th>Operateur</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${mouvements.empty}">
                                <td colspan="8" class="text-center text-muted">
                                    Aucun mouvement trouve
                                </td>
                            </tr>
                            <tr th:each="mvt : ${mouvements}">
                                <td th:text="${mvt.code}">MVT-001</td>
                                <td th:text="${#temporals.format(mvt.dateMouvement, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                                <td th:text="${mvt.typeMouvement}">ENTREE</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${mvt.statutMouvement == 'BROUILLON' ? 'bg-secondary' : 
                                                         mvt.statutMouvement == 'VALIDE' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${mvt.statutMouvement}">BROUILLON</span>
                                </td>
                                <td th:text="${mvt.client}">Client ABC</td>
                                <td th:text="${mvt.nbLignes}">3</td>
                                <td th:text="${mvt.operateur}">Admin</td>
                                <td>
                                    <a th:href="@{/mouvements/{id}/detail(id=${mvt.id})}" 
                                       class="btn btn-sm btn-info" title="Voir detail">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div th:replace="~{fragments/pagination :: pagination(${currentPage}, ${totalPages}, '/mouvements/liste')}"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</body>
</html>
