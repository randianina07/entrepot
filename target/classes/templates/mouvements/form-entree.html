<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container py-4">
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        
        <section class="storage-hero mb-4">
            <div class="hero-copy">
                <span class="hero-badge">Mouvement entrant</span>
                <h1>Nouvelle entrée</h1>
                <p>Créez une entrée avec une saisie plus claire, des cartes aérées et un parcours plus guidé.</p>
                <div class="hero-actions">
                    <a href="/mouvements/liste" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> Retour à la liste</a>
                </div>
            </div>
            <div class="hero-side">
                <div class="mini-info-card"><span class="value">Entrée</span><span class="label">Type de mouvement</span></div>
                <div class="mini-info-card"><span class="value">1+</span><span class="label">Lignes possibles</span></div>
            </div>
        </section>
        
        <div class="storage-search-card">
            <div class="storage-section-header">
                <div>
                    <span class="chip is-accent">Création</span>
                    <h2 class="mb-0 mt-2">Formulaire d'entrée</h2>
                </div>
            </div>
            <div class="search-form-shell">
                <form th:action="@{/mouvements/nouveau}" method="post" id="formEntree" th:object="${dto}">
                    <input type="hidden" name="type" value="ENTREE">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="clientId" class="form-label">Client <span class="text-danger">*</span></label>
                            <select class="form-select" id="clientId" name="clientId" required>
                                <option value="">Selectionner un client</option>
                                <option th:each="c : ${clients}" th:value="${c.id}" 
                                        th:text="${c.displayName}"></option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('clientId')}" 
                                 th:errors="*{clientId}">Erreur client</div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3" 
                                  placeholder="Notes optionnelles..."></textarea>
                        <div class="text-danger" th:if="${#fields.hasErrors('notes')}" 
                             th:errors="*{notes}">Erreur notes</div>
                    </div>
                    
                    <hr class="my-4">
                    
                    <h4 class="mb-3"><i class="bi bi-list"></i> Lignes du mouvement</h4>
                    
                    <div id="lignesContainer">
                        <!-- Ligne par defaut -->
                        <div class="ligne-mouvement storage-detail-card mb-3" data-ligne-index="0">
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-3">
                                        <label class="form-label">Produit <span class="text-danger">*</span></label>
                                        <select class="form-select produit-select" name="lignes[0].produitId" required>
                                            <option value="">Selectionner</option>
                                            <option th:each="p : ${produits}" th:value="${p.id}" 
                                                    th:text="${p.nom}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Emplacement Destination <span class="text-danger">*</span></label>
                                        <select class="form-select emplacement-select" name="lignes[0].emplacementDestId" required>
                                            <option value="">Selectionner</option>
                                                <option th:each="e : ${emplacements}" th:value="${e.id}" 
                                                    th:data-capacite-volume-m3="${e.capaciteVolumeM3}"
                                                    th:text="${e.code + ' (Capacite: ' + e.capaciteVolumeM3 + ' m³)'}"></option>
                                        </select>
                                        <small class="text-muted" id="capacite-restante-0">Capacite restante: --</small>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Quantite <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" name="lignes[0].quantite" 
                                               min="1" step="0.01" required>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Volume (m³)</label>
                                        <input type="number" class="form-control" name="lignes[0].volume" 
                                               min="0" step="0.01" placeholder="Optionnel">
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <button type="button" class="btn btn-danger w-100 supprimer-ligne" 
                                                onclick="supprimerLigne(this)" disabled>
                                            <i class="bi bi-trash"></i> Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-outline-primary mb-3" onclick="ajouterLigne()">
                        <i class="bi bi-plus-circle"></i> Ajouter une ligne
                    </button>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Enregistrer en brouillon
                        </button>
                        <a href="/mouvements/liste" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="/js/mouvement-form-entree.js"></script>
</body>
</html>
