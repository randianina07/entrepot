<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion d'Entrepot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/mouvements/tableau-de-bord">
            <i class="bi bi-box-seam"></i> Gestion Entrepôt
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#execInfo.templateName == 'mouvements/dashboard' ? 'active' : ''}" 
                       href="/mouvements/tableau-de-bord">
                        <i class="bi bi-speedometer2"></i> Statistiques
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       th:classappend="${#execInfo.templateName == 'mouvements/liste' or #execInfo.templateName == 'mouvements/detail' or #execInfo.templateName == 'mouvements/form-entree' or #execInfo.templateName == 'mouvements/form-sortie' ? 'active' : ''}"
                       href="#" id="mouvementsDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-arrow-left-right"></i> Mouvements
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/mouvements/liste"><i class="bi bi-list-ul"></i> Liste</a></li>
                        <li><a class="dropdown-item" href="/mouvements/nouveau/entree"><i class="bi bi-arrow-down-circle"></i> Nouvelle entrée</a></li>
                        <li><a class="dropdown-item" href="/mouvements/nouveau/sortie"><i class="bi bi-arrow-up-circle"></i> Nouvelle sortie</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                          <a class="nav-link dropdown-toggle"
                              th:classappend="${#execInfo.templateName == 'mouvements/dashboard' ? 'active' : ''}"
                       href="#" id="dashboardDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-bar-chart"></i> Tableau de bord
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/mouvements/tableau-de-bord"><i class="bi bi-speedometer2"></i> Vue d'ensemble</a></li>
                        <li><a class="dropdown-item" href="/mouvements/export/pdf"><i class="bi bi-file-earmark-pdf"></i> Export PDF</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle"
                       th:classappend="${#strings.startsWith(#execInfo.templateName, 'Emplacement/') or #execInfo.templateName == 'search' ? 'active' : ''}"
                       href="#" id="storageDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-boxes"></i> Stockages
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/accueil">
                            <i class="bi bi-house-door"></i> Accueil
                        </a></li>
                        <li><a class="dropdown-item" href="/choose-type_zones">
                            <i class="bi bi-grid-3x3-gap"></i> Visualisation
                        </a></li>
                        <li><a class="dropdown-item" href="/recherche">
                            <i class="bi bi-search"></i> Recherche rapide
                        </a></li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="nav-link" th:if="${#authentication != null}" th:text="${#authentication.name}">Utilisateur</span>
                    <span class="nav-link" th:if="${#authentication == null}">Utilisateur</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="bi bi-box-arrow-right"></i> Deconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
