<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion d'Entrepôt - Mouvements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/mouvements/tableau-de-bord">
            <i class="bi bi-box-seam"></i> Gestion Entrepôt
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#execInfo.templateName == 'mouvements/dashboard' ? 'active' : ''}" 
                       href="/mouvements/tableau-de-bord">
                        <i class="bi bi-speedometer2"></i> Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${#execInfo.templateName == 'mouvements/liste' ? 'active' : ''}" 
                       href="/mouvements/liste">
                        <i class="bi bi-list-ul"></i> Liste des mouvements
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-plus-circle"></i> Nouveau mouvement
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/mouvements/nouveau/entree">
                            <i class="bi bi-arrow-down-circle"></i> Entree
                        </a></li>
                        <li><a class="dropdown-item" href="/mouvements/nouveau/sortie">
                            <i class="bi bi-arrow-up-circle"></i> Sortie
                        </a></li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="nav-link" th:if="${#authentication != null}" th:text="${#authentication.name}">Utilisateur</span>
                    <span class="nav-link" th:if="${#authentication == null}">Utilisateur</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="bi bi-box-arrow-right"></i> Deconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
