<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte client - Gestion Entrepôt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="pro-login-page">
    <div class="pro-login-card pro-register-card fade-in">
        <div class="pro-login-header">
            <div class="pro-login-icon">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1 class="pro-login-title">Créer un compte client</h1>
            <p class="pro-login-subtitle">Inscription sécurisée à la plateforme Gestion Entrepôt</p>
        </div>

        <div th:if="${erreur}" class="pro-alert pro-alert-danger" th:text="${erreur}"></div>

        <form class="row g-3" th:action="@{/utilisateurs/enregistrer}" method="post" id="signupForm">
            <div class="col-md-6">
                <label for="email" class="pro-form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="pro-form-control" id="email" name="email" required>
            </div>

            <div class="col-md-6">
                <label for="numero" class="pro-form-label">Téléphone</label>
                <input type="text" class="pro-form-control" id="numero" name="numero" placeholder="034 XX XXX XX">
            </div>

            <div class="col-md-6">
                <label for="nom" class="pro-form-label">Nom <span class="text-danger">*</span></label>
                <input type="text" class="pro-form-control" id="nom" name="nom" required>
            </div>

            <div class="col-md-6">
                <label for="prenom" class="pro-form-label">Prénom</label>
                <input type="text" class="pro-form-control" id="prenom" name="prenom">
            </div>

            <div class="col-md-6">
                <label for="secteur" class="pro-form-label">Secteur</label>
                <input type="text" class="pro-form-control" id="secteur" name="secteur"
                    placeholder="Commerce, Industrie...">
            </div>

            <div class="col-md-6">
                <label for="adresse" class="pro-form-label">Adresse</label>
                <input type="text" class="pro-form-control" id="adresse" name="adresse">
            </div>

            <div class="col-md-6">
                <label for="motDePasse" class="pro-form-label">Mot de passe <span class="text-danger">*</span></label>
                <input type="password" class="pro-form-control" id="motDePasse" name="motDePasse" required
                    minlength="6">
                <small class="text-muted">Minimum 6 caractères</small>
            </div>

            <div class="col-md-6">
                <label for="confirmMotDePasse" class="pro-form-label">Confirmer le mot de passe <span
                        class="text-danger">*</span></label>
                <input type="password" class="pro-form-control" id="confirmMotDePasse" required minlength="6">
                <small id="passwordHelp" class="text-muted">Les mots de passe doivent correspondre</small>
            </div>

            <div class="col-12">
                <label for="roleId" class="pro-form-label">Rôle</label>
                <select class="pro-form-select" id="roleId" name="roleId" required>
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.libelle}"
                        th:selected="${role.code == 'CLIENT'}"></option>
                </select>
            </div>

            <div class="col-12 mt-3 d-flex flex-wrap gap-2">
                <button class="btn btn-pro-primary" type="submit">
                    <i class="bi bi-person-check me-1"></i> Créer mon compte
                </button>
                <a class="btn btn-pro-outline" th:href="@{/clients}">
                    <i class="bi bi-arrow-left me-1"></i> Retour connexion
                </a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const pwd = document.getElementById('motDePasse');
        const confirmPwd = document.getElementById('confirmMotDePasse');
        const help = document.getElementById('passwordHelp');

        function validatePasswords() {
            if (!pwd || !confirmPwd || !help) return true;
            if (confirmPwd.value.length === 0) {
                help.textContent = 'Les mots de passe doivent correspondre';
                help.className = 'text-muted';
                confirmPwd.setCustomValidity('');
                return true;
            }
            if (pwd.value !== confirmPwd.value) {
                help.textContent = 'Les mots de passe ne correspondent pas';
                help.className = 'text-danger';
                confirmPwd.setCustomValidity('Les mots de passe ne correspondent pas');
                return false;
            }
            help.textContent = 'Mots de passe identiques';
            help.className = 'text-success';
            confirmPwd.setCustomValidity('');
            return true;
        }

        if (pwd && confirmPwd) {
            pwd.addEventListener('input', validatePasswords);
            confirmPwd.addEventListener('input', validatePasswords);
        }

        if (form) {
            form.addEventListener('submit', function (e) {
                if (!validatePasswords()) {
                    e.preventDefault();
                }
            });
        }
    </script>
</body>

</html>
