<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte créé - Tech Entrepôt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="pro-login-page">
<div class="pro-login-card fade-in">
    <div class="pro-login-header">
        <div class="pro-login-icon">
            <i class="bi bi-check2-circle"></i>
        </div>
        <h1 class="pro-login-title">Compte créé avec succès</h1>
        <p class="pro-login-subtitle">Votre compte client est maintenant actif</p>
    </div>

    <div class="pro-alert pro-alert-success">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}">L'utilisateur a été créé avec succès.</span>
    </div>

    <div class="pro-card" style="padding: 1rem;">
        <p class="mb-2"><strong>Email :</strong> <span th:text="${email}"></span></p>
        <p class="mb-0"><strong>Rôle :</strong> <span th:text="${role}"></span></p>
    </div>

    <div class="d-grid gap-2 mt-4">
        <a th:href="@{/login}" class="btn btn-pro-primary">
            <i class="bi bi-box-arrow-in-right me-1"></i> Aller à la connexion
        </a>
        <a th:href="@{/utilisateurs/nouveau}" class="btn btn-pro-outline">
            <i class="bi bi-person-plus me-1"></i> Créer un autre compte
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
