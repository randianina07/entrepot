<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/alerts :: alerts}"></div>

    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-box"></i> Gestion des produits</span>
            <h1>Liste des produits</h1>
            <p>Gérez le catalogue des produits stockés dans l'entrepôt.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/mouvements/tableau-de-bord}">Accueil</a>
                <a class="btn btn-primary" th:href="@{/produits/save}">Ajouter un produit</a>
            </div>
        </div>
        <div class="hero-side">
            <div class="mini-info-card">
                <span class="value" th:text="${produits != null ? #lists.size(produits) : 0}">0</span>
                <span class="label">Produits</span>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Filtres</span>
                <h2 class="mb-0 mt-2">Recherche et filtres</h2>
            </div>
        </div>

        <div class="search-form-shell mb-4">
            <form class="row g-3" method="get" th:action="@{/produits/liste}">
                <div class="col-md-3">
                    <label for="code" class="form-label">Code</label>
                    <input type="text" class="form-control" id="code" name="code" th:value="${code}">
                </div>
                <div class="col-md-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input type="text" class="form-control" id="nom" name="nom" th:value="${nom}">
                </div>
                <div class="col-md-3">
                    <label for="typeProduitId" class="form-label">Type de produit</label>
                    <select class="form-select" id="typeProduitId" name="typeProduitId">
                        <option value="">Tous</option>
                        <option th:each="t : ${typesProduit}"
                                th:value="${t.id}"
                                th:text="${t.libelle}"
                                th:selected="${typeProduitId != null and typeProduitId.equals(t.id.toString())}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="actif" class="form-label">Statut</label>
                    <select class="form-select" id="actif" name="actif">
                        <option value="">Tous</option>
                        <option value="true" th:selected="${actif == 'true'}">Actif</option>
                        <option value="false" th:selected="${actif == 'false'}">Inactif</option>
                    </select>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-filter"></i> Filtrer
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/produits/liste}">
                        <i class="bi bi-arrow-counterclockwise"></i> Réinitialiser
                    </a>
                </div>
            </form>
        </div>
    </section>

    <section class="storage-panel p-0 overflow-hidden">
        <div class="storage-section-header px-4 pt-4">
            <div>
                <span class="chip is-success">Résultats</span>
                <h2 class="mb-0 mt-2">Produits</h2>
            </div>
        </div>
        <div class="px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Code</th>
                        <th>Nom</th>
                        <th>Type</th>
                        <th>Volume unitaire</th>
                        <th>Poids unitaire</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${produits == null or produits.isEmpty()}">
                        <td colspan="7">
                            <div class="empty-state">Aucun produit trouvé.</div>
                        </td>
                    </tr>
                    <tr th:each="p : ${produits}">
                        <td th:text="${p.code}"></td>
                        <td th:text="${p.nom}"></td>
                        <td th:text="${p.typeProduit != null ? p.typeProduit.libelle : '-'}"></td>
                        <td th:text="${p.volumeUnitaireM3} + ' m³'"></td>
                        <td th:text="${p.poidsUnitaireKg != null ? p.poidsUnitaireKg + ' kg' : '-'}"></td>
                        <td>
                            <span class="badge" th:classappend="${p.actif} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${p.actif} ? 'Actif' : 'Inactif'"></span>
                        </td>
                        <td>
                            <a th:href="@{/produits/modifier/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/produits/supprimer/{id}(id=${p.id})}"
                               onclick="return confirm('Voulez-vous vraiment supprimer ce produit ?')"
                               class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
