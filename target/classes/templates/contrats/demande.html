<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-clipboard-plus"></i> Demande de stockage</span>
            <h1>Faire une demande de stockage</h1>
            <p>Envoyez une demande de stockage à l'entrepôt.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/mouvements/tableau-de-bord}">Accueil</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations de la demande</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" th:action="@{/contrats/demande}" method="post">
                <div class="col-md-6">
                    <label for="typeZoneId" class="form-label">Type de zone <span class="text-danger">*</span></label>
                    <select class="form-select" id="typeZoneId" name="typeZoneId" required>
                        <option value="">-- Choisir une zone --</option>
                        <option th:each="zone : ${typesZone}" th:value="${zone.id}" th:text="${zone.libelle}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="typeContratId" class="form-label">Type de contrat <span class="text-danger">*</span></label>
                    <select class="form-select" id="typeContratId" name="typeContratId" required>
                        <option value="">-- Choisir un contrat --</option>
                        <option th:each="contrat : ${typesContrat}" th:value="${contrat.id}" th:text="${contrat.libelle}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="volumeEspaceM3" class="form-label">Volume demandé (m³) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="volumeEspaceM3" name="volumeEspaceM3" step="0.001" min="0.001" required>
                </div>

                <div class="col-md-4">
                    <label for="dateDebut" class="form-label">Date de début <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dateDebut" name="dateDebut" required>
                </div>

                <div class="col-md-4">
                    <label for="dateFin" class="form-label">Date de fin</label>
                    <input type="date" class="form-control" id="dateFin" name="dateFin">
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-send"></i> Envoyer la demande
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/mouvements/tableau-de-bord}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
