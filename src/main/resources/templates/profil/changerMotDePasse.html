<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Changer le mot de passe</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header">
                <h3>Changer mon mot de passe</h3>
            </div>

            <div class="card-body">

                <form th:action="@{/profil/motDePasse}" method="post">

                    <div class="mb-3">
                        <label class="form-label">
                            Ancien mot de passe
                        </label>

                        <div class="input-group">
                            <input type="password" id="ancienMotDePasse" name="ancienMotDePasse" class="form-control"
                                required>

                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword('ancienMotDePasse', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nouveau mot de passe
                        </label>

                        <div class="input-group">
                            <input type="password" id="nouveauMotDePasse" name="nouveauMotDePasse" class="form-control"
                                required>

                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword('nouveauMotDePasse', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Confirmation
                        </label>

                        <div class="input-group">
                            <input type="password" id="confirmationMotDePasse" name="confirmationMotDePasse"
                                class="form-control" required>

                            <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword('confirmationMotDePasse', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">

                        Modifier

                    </button>

                    <a th:href="@{/profil}" class="btn btn-secondary">

                        Retour

                    </a>

                </form>

                <div class="alert alert-success mt-3" th:if="${success}" th:text="${success}">
                </div>

                <div class="alert alert-danger mt-3" th:if="${erreur}" th:text="${erreur}">
                </div>

            </div>

        </div>

    </div>

    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>
</body>

</html>
