<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Changer le mot de passe</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>Changer mon mot de passe</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/profil/mot-de-passe}"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Ancien mot de passe
                    </label>

                    <input
                            type="password"
                            name="ancienMotDePasse"
                            class="form-control"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Nouveau mot de passe
                    </label>

                    <input
                            type="password"
                            name="nouveauMotDePasse"
                            class="form-control"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Confirmation
                    </label>

                    <input
                            type="password"
                            name="confirmationMotDePasse"
                            class="form-control"
                            required>

                </div>

                <button
                        type="submit"
                        class="btn btn-primary">

                    Modifier

                </button>

                <a
                        th:href="@{/profil}"
                        class="btn btn-secondary">

                    Retour

                </a>

            </form>

            <div
                    class="alert alert-success mt-3"
                    th:if="${success}"
                    th:text="${success}">
            </div>

            <div
                    class="alert alert-danger mt-3"
                    th:if="${erreur}"
                    th:text="${erreur}">
            </div>

        </div>

    </div>

</div>

</body>
</html>
