<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe - Tech-Entrepôt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="pro-body">

    <div th:replace="~{fragments/navbar-new :: navbar}"></div>

    <div class="container py-4">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="pro-card">
                    <div class="pro-card-header">
                        <h2 class="pro-card-title">Changer mon mot de passe</h2>
                        <p class="pro-card-subtitle">Sécurisez votre compte</p>
                    </div>

                    <div class="card-body">

                        <form th:action="@{/profil/motDePasse}" method="post">

                            <div class="mb-3">
                                <label class="pro-form-label">Ancien mot de passe</label>
                                <div class="input-group">
                                    <input type="password" id="ancienMotDePasse" name="ancienMotDePasse"
                                        class="pro-form-control" required>
                                    <button class="btn btn-pro-outline" type="button"
                                        onclick="togglePassword('ancienMotDePasse', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="pro-form-label">Nouveau mot de passe</label>
                                <div class="input-group">
                                    <input type="password" id="nouveauMotDePasse" name="nouveauMotDePasse"
                                        class="pro-form-control" required>
                                    <button class="btn btn-pro-outline" type="button"
                                        onclick="togglePassword('nouveauMotDePasse', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="pro-form-label">Confirmation</label>
                                <div class="input-group">
                                    <input type="password" id="confirmationMotDePasse" name="confirmationMotDePasse"
                                        class="pro-form-control" required>
                                    <button class="btn btn-pro-outline" type="button"
                                        onclick="togglePassword('confirmationMotDePasse', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-pro-primary flex-fill">
                                    <i class="bi bi-check-lg me-2"></i>Modifier
                                </button>
                                <a th:href="@{/profil}" class="btn btn-pro-outline flex-fill">
                                    <i class="bi bi-arrow-left me-2"></i>Retour
                                </a>
                            </div>

                        </form>

                        <div class="pro-alert pro-alert-success mt-3" th:if="${success}" th:text="${success}"></div>
                        <div class="pro-alert pro-alert-danger mt-3" th:if="${erreur}" th:text="${erreur}"></div>

                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector("i");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>
</body>

</html>
