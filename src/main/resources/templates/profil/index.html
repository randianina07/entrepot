<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon profil</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>Mon profil</h3>
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Nom</th>
                    <td th:text="${profil.nom}"></td>
                </tr>

                <tr>
                    <th>Prénom</th>
                    <td th:text="${profil.prenom}"></td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td th:text="${profil.utilisateur.email}"></td>
                </tr>

                <tr>
                    <th>Téléphone</th>
                    <td th:text="${profil.numero}"></td>
                </tr>

                <tr>
                    <th>Adresse</th>
                    <td th:text="${profil.adresse}"></td>
                </tr>

                <tr>
                    <th>Secteur</th>
                    <td th:text="${profil.secteur}"></td>
                </tr>

                <tr>
                    <th>Rôle</th>
                    <td th:text="${profil.utilisateur.role.libelle}"></td>
                </tr>

                <tr>
                    <th>Date de création</th>
                    <td th:text="${#temporals.format(profil.utilisateur.dateCreation,'dd/MM/yyyy HH:mm')}"></td>
                </tr>

            </table>

            <a th:href="@{/profil/motDePasse}"
               class="btn btn-warning">
                Modifier le mot de passe
            </a>

        </div>

    </div>

</div>

</body>
</html>
