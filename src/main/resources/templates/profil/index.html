<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mon profil</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header">
                <h3>Mon profil</h3>
            </div>

            <div class="card-body">

                <table class="table table-bordered">

                    <tr>
                        <th>Nom</th>
                        <td th:text="${profil.nom}"></td>
                    </tr>

                    <tr>
                        <th>Prénom</th>
                        <td th:text="${profil.prenom}"></td>
                    </tr>

                    <tr>
                        <th>Email</th>
                        <td th:text="${profil.utilisateur.email}"></td>
                    </tr>

                    <tr>
                        <th>Téléphone</th>
                        <td th:text="${profil.numero}"></td>
                    </tr>

                    <tr>
                        <th>Adresse</th>
                        <td th:text="${profil.adresse}"></td>
                    </tr>

                    <tr>
                        <th>Secteur</th>
                        <td th:text="${profil.secteur}"></td>
                    </tr>

                    <tr>
                        <th>Rôle</th>
                        <td th:text="${profil.utilisateur.role.libelle}"></td>
                    </tr>

                    <tr>
                        <th>Date de création</th>
                        <td th:text="${#temporals.format(profil.utilisateur.dateCreation,'dd/MM/yyyy HH:mm')}"></td>
                    </tr>

                </table>

                <a th:href="@{/profil/motDePasse}" class="btn btn-warning">
                    Modifier le mot de passe
                </a>
                <hr class="my-4">

                <h4>Mes contrats</h4>

                <form th:action="@{/profil}" method="get" class="row g-3 mb-4">

                    <div class="col-md-4">
                        <input type="date" class="form-control" name="dateDebut" th:value="${dateDebut}">
                    </div>

                    <div class="col-md-auto">
                        <button type="submit" class="btn btn-primary">
                            Rechercher
                        </button>
                    </div>

                    <div class="col-md-auto">
                        <a th:href="@{/profil}" class="btn btn-secondary">
                            Réinitialiser
                        </a>
                    </div>

                </form>

                <!-- ======================= -->
                <!-- CONTRATS D'ABONNEMENT -->
                <!-- ======================= -->

                <h5 class="mt-4">Contrats d'abonnement</h5>

                <table class="table table-striped table-bordered">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Type zone</th>
                            <th>Volume (m³)</th>
                            <th>Emplacements</th>
                            <th>Date début</th>
                            <th>Durée (mois)</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="contrat : ${contrats}" th:if="${contrat.dureeMois != null}">

                            <td th:text="${contrat.id}"></td>
                            <td th:text="${contrat.typeZone.libelle}"></td>
                            <td th:text="${contrat.volumeEspaceM3}"></td>
                            <td th:text="${contrat.quantiteEmplacement}"></td>
                            <td th:text="${#temporals.format(contrat.dateDebut,'dd/MM/yyyy')}"></td>
                            <td th:text="${contrat.dureeMois}"></td>

                        </tr>

                    </tbody>

                </table>

                <h5 class="mt-5">Contrats simples</h5>

                <table class="table table-striped table-bordered">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Type zone</th>
                            <th>Volume (m³)</th>
                            <th>Emplacements</th>
                            <th>Date début</th>
                            <th>Date fin</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="contrat : ${contrats}" th:if="${contrat.dureeMois == null}">

                            <td th:text="${contrat.id}"></td>
                            <td th:text="${contrat.typeZone.libelle}"></td>
                            <td th:text="${contrat.volumeEspaceM3}"></td>
                            <td th:text="${contrat.quantiteEmplacement}"></td>
                            <td th:text="${#temporals.format(contrat.dateDebut,'dd/MM/yyyy')}"></td>
                            <td
                                th:text="${contrat.dateFin != null ? #temporals.format(contrat.dateFin,'dd/MM/yyyy') : '-'}">
                            </td>

                            <th>Date fin</th>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
