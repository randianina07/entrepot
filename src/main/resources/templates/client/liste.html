<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-people"></i> Clients</span>
            <h1>Liste des clients</h1>
            <p>Gérez les clients de l'entrepôt.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/utilisateurs/nouveau}">Nouveau client</a>
            </div>
        </div>
        <div class="hero-side">
            <div class="mini-info-card">
                <span class="value" th:text="${clients != null ? #lists.size(clients) : 0}">0</span>
                <span class="label">Clients</span>
            </div>
        </div>
    </section>

    <section class="storage-panel p-0 overflow-hidden">
        <div class="storage-section-header px-4 pt-4">
            <div>
                <span class="chip is-success">Liste</span>
                <h2 class="mb-0 mt-2">Tous les clients</h2>
            </div>
        </div>
        <div class="px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Numéro</th>
                        <th>Adresse</th>
                        <th>Secteur</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${clients == null or clients.isEmpty()}">
                        <td colspan="7">
                            <div class="empty-state">Aucun client enregistré.</div>
                        </td>
                    </tr>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.nom}"></td>
                        <td th:text="${client.prenom}"></td>
                        <td th:text="${client.numero}"></td>
                        <td th:text="${client.adresse}"></td>
                        <td th:text="${client.secteur}"></td>
                        <td th:text="${client.utilisateur.email}"></td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/clients/modifier/{id}(id=${client.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/clients/supprimer/{id}(id=${client.id})}" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </a>
                                <a th:href="@{/contrats/create(clientId=${client.utilisateur.id})}" class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-file-earmark-plus"></i> Contrat
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
