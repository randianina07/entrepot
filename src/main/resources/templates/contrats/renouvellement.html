<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-arrow-clockwise"></i> Renouvellement</span>
            <h1>Demande de renouvellement</h1>
            <p>Demander le renouvellement d'un contrat existant.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/contrats/renouvellements}">Voir les demandes</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations du renouvellement</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" th:action="@{/contrats/renouvellement}" method="post">
                <div class="col-md-6">
                    <label for="contratId" class="form-label">Contrat à renouveler <span class="text-danger">*</span></label>
                    <select class="form-select" id="contratId" name="contratId" required>
                        <option value="">-- Sélectionner un contrat --</option>
                        <option th:each="contrat : ${contrats}" 
                                th:value="${contrat.id}"
                                th:text="|Contrat #${contrat.id} - ${contrat.type_zone_libelle} (${contrat.date_debut_fmt} → ${contrat.date_fin_fmt}) - ${contrat.client_email}|">
                        </option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="dateFin" class="form-label">Nouvelle date de fin souhaitée <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dateFin" name="dateFin" required>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-send"></i> Envoyer la demande
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/contrats/renouvellements}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
