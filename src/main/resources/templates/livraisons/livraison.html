<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-box-arrow-up-right"></i> Livraisons</span>
            <h1>Livraisons disponibles</h1>
            <p>Configurez et gérez les livraisons en attente.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/mouvements/tableau-de-bord}">Accueil</a>
            </div>
        </div>
        <div class="hero-side">
            <div class="mini-info-card">
                <span class="value" th:text="${listeLivraison != null ? #lists.size(listeLivraison) : 0}">0</span>
                <span class="label">Livraisons</span>
            </div>
        </div>
    </section>

    <section class="storage-panel p-0 overflow-hidden">
        <div class="storage-section-header px-4 pt-4">
            <div>
                <span class="chip is-success">Liste</span>
                <h2 class="mb-0 mt-2">Livraisons à configurer</h2>
            </div>
        </div>
        <div class="px-4 pb-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Client</th>
                        <th>Adresse</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${listeLivraison == null or listeLivraison.isEmpty()}">
                        <td colspan="4">
                            <div class="empty-state">Aucune livraison disponible.</div>
                        </td>
                    </tr>
                    <tr th:each="l : ${listeLivraison}">
                        <td th:text="${l.id}"></td>
                        <td th:text="${l.client.user_email}"></td>
                        <td th:text="${l.adresseLivraison}"></td>
                        <td>
                            <a th:href="@{/livraisons/config_livraison(id=${l.id})}" class="btn btn-sm btn-primary">
                                <i class="bi bi-gear"></i> Configurer
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
