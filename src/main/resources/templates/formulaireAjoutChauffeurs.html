<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-person-plus"></i> Nouveau chauffeur</span>
            <h1>Ajouter un chauffeur</h1>
            <p>Enregistrez un nouveau chauffeur dans le système.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/chauffeurs}">Retour à la liste</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations du chauffeur</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" method="post" th:action="@{/chauffeurs/ajouter}">
                <div class="col-md-6">
                    <label for="nom" class="form-label">Nom <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nom" name="nom" required>
                </div>

                <div class="col-md-6">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" class="form-control" id="prenom" name="prenom">
                </div>

                <div class="col-md-6">
                    <label for="telephone" class="form-label">Téléphone</label>
                    <input type="text" class="form-control" id="telephone" name="telephone">
                </div>

                <div class="col-md-6">
                    <label for="numeroPermis" class="form-label">Numéro de permis <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="numeroPermis" name="numeroPermis" required>
                </div>

                <div class="col-md-6">
                    <label for="dateExpirationPermis" class="form-label">Date d'expiration du permis <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dateExpirationPermis" name="dateExpirationPermis" required>
                </div>

                <div class="col-md-6 d-flex align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="actif" name="actif" checked>
                        <label class="form-check-label" for="actif">Actif</label>
                    </div>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Enregistrer
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/chauffeurs}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
