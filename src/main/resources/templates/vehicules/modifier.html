<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head}"></head>
<body class="storage-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <section class="storage-hero mb-4">
        <div class="hero-copy">
            <span class="hero-badge"><i class="bi bi-truck-front"></i> Modifier véhicule</span>
            <h1>Modifier un véhicule</h1>
            <p>Mettez à jour les informations du véhicule.</p>
            <div class="hero-actions">
                <a class="btn btn-outline-primary" th:href="@{/vehicules/liste}">Retour à la liste</a>
            </div>
        </div>
    </section>

    <section class="storage-section">
        <div class="storage-section-header">
            <div>
                <span class="chip is-accent">Formulaire</span>
                <h2 class="mb-0 mt-2">Informations du véhicule</h2>
            </div>
        </div>

        <div class="search-form-shell">
            <form class="row g-3" th:action="@{/vehicules/modifier/{id}(id=${vehicule.id})}" th:object="${vehicule}" method="post">
                <div class="col-md-6">
                    <label for="immatriculation" class="form-label">Immatriculation <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="immatriculation" th:field="*{immatriculation}" placeholder="Immatriculation" required>
                </div>

                <div class="col-md-6">
                    <label for="marque" class="form-label">Marque <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="marque" th:field="*{marque}" placeholder="Marque" required>
                </div>

                <div class="col-md-6">
                    <label for="modele" class="form-label">Modèle</label>
                    <input type="text" class="form-control" id="modele" th:field="*{modele}" placeholder="Modèle">
                </div>

                <div class="col-md-6">
                    <label for="annee" class="form-label">Année</label>
                    <input type="number" class="form-control" id="annee" th:field="*{annee}" placeholder="Année">
                </div>

                <div class="col-md-4">
                    <label for="capaciteVolumeM3" class="form-label">Capacité Volume (m³) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control" id="capaciteVolumeM3" th:field="*{capaciteVolumeM3}" placeholder="Capacité Volume" required>
                </div>

                <div class="col-md-4">
                    <label for="capaciteChargeKg" class="form-label">Capacité Charge (kg) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control" id="capaciteChargeKg" th:field="*{capaciteChargeKg}" placeholder="Capacité kg" required>
                </div>

                <div class="col-md-4">
                    <label for="kilometrageActuel" class="form-label">Kilométrage actuel</label>
                    <input type="number" step="0.01" class="form-control" id="kilometrageActuel" th:field="*{kilometrageActuel}" placeholder="Kilométrage actuel">
                </div>

                <div class="col-md-6">
                    <label for="typeVehiculeId" class="form-label">Type véhicule <span class="text-danger">*</span></label>
                    <select class="form-select" id="typeVehiculeId" name="typeVehiculeId" required>
                        <option value="">Choisir un type</option>
                        <option th:each="t : ${typesVehicule}"
                                th:value="${t.id}"
                                th:text="${t.libelle}"
                                th:selected="${vehicule.typeVehicule != null and vehicule.typeVehicule.id == t.id}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="statutId" class="form-label">Statut <span class="text-danger">*</span></label>
                    <select class="form-select" id="statutId" name="statutId" required>
                        <option value="">Choisir un statut</option>
                        <option th:each="s : ${statutVehicule}"
                                th:value="${s.id}"
                                th:text="${s.libelle}"
                                th:selected="${vehicule.statutVehicule != null and vehicule.statutVehicule.id == s.id}"></option>
                    </select>
                </div>

                <div class="col-12 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Modifier
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/vehicules/liste}">
                        <i class="bi bi-x-circle"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
