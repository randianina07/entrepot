<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Tech Entrepôt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="pro-login-page">
    <div class="pro-login-card fade-in">
        <div class="pro-login-header">
            <div class="pro-login-icon">
                <i class="bi bi-box-seam-fill"></i>
            </div>
            <h1 class="pro-login-title">Tech Entrepôt</h1>
            <p class="pro-login-subtitle">Connexion sécurisée à la plateforme ERP</p>
        </div>

        <div th:if="${param.error}" class="pro-alert pro-alert-danger mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Email ou mot de passe incorrect.
        </div>

        <div th:if="${param.logout}" class="pro-alert pro-alert-success mb-4">
            <i class="bi bi-check-circle-fill me-2"></i>
            Vous avez été déconnecté avec succès.
        </div>

        <form th:action="@{/login}" method="post" class="pro-login-form">
            <div class="mb-4">
                <label for="username" class="pro-form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text pro-input-icon"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="pro-form-control" id="username" name="username"
                           placeholder="admin@entrepot.com" required autofocus>
                </div>
                <small class="text-muted mt-1 d-block">Compte admin par défaut : <strong>admin@entrepot.com / admin123</strong></small>
            </div>

            <div class="mb-4">
                <label for="password" class="pro-form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text pro-input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" class="pro-form-control" id="password" name="password" required>
                    <button type="button" class="btn btn-outline-secondary" id="togglePassword" aria-label="Afficher le mot de passe">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                <label class="form-check-label" for="rememberMe" style="color: var(--text-secondary);">
                    Se souvenir de moi
                </label>
            </div>

            <button type="submit" class="btn btn-pro-primary w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i> Se connecter
            </button>

            <a th:href="@{/utilisateurs/nouveau}" class="btn btn-pro-outline w-100">
                <i class="bi bi-person-plus me-2"></i> Créer un compte client
            </a>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="bi bi-shield-lock me-1"></i> Accès protégé & traçabilité des actions
            </small>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
            });
        }
    </script>
</body>
</html>
