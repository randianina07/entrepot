<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="pagination(currentPage, totalPages, baseUrl)" aria-label="Pagination" th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
            <a class="page-link" th:href="@{${baseUrl}(page=${currentPage - 1}, size=${10}, 
                type=${filtre?.type}, statut=${filtre?.statut}, clientId=${filtre?.clientId}, 
                dateDebut=${filtre?.dateDebutStr}, dateFin=${filtre?.dateFinStr})}">
                <i class="bi bi-chevron-left"></i> Precedent
            </a>
        </li>
        
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
            th:classappend="${i == currentPage} ? 'active' : ''">
            <a class="page-link" th:href="@{${baseUrl}(page=${i}, size=${10}, 
                type=${filtre?.type}, statut=${filtre?.statut}, clientId=${filtre?.clientId}, 
                dateDebut=${filtre?.dateDebutStr}, dateFin=${filtre?.dateFinStr})}" 
               th:text="${i + 1}">1</a>
        </li>
        
        <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">
            <a class="page-link" th:href="@{${baseUrl}(page=${currentPage + 1}, size=${10}, 
                type=${filtre?.type}, statut=${filtre?.statut}, clientId=${filtre?.clientId}, 
                dateDebut=${filtre?.dateDebutStr}, dateFin=${filtre?.dateFinStr})}">
                Suivant <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
    
    <div class="text-center text-muted mt-2">
        <small th:text="'Page ' + ${currentPage + 1} + ' sur ' + ${totalPages} + ' (' + ${totalElements} + ' elements)'">
            Page 1 sur 1 (10 elements)
        </small>
    </div>
</nav>

</body>
</html>
